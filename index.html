
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.header{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem}
.title{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.subtitle{font-size:14px;color:var(--color-text-secondary);margin-top:4px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.filter-btn{font-size:12px;padding:5px 12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--color-background-tertiary);color:var(--color-text-primary);border-color:var(--color-border-primary);font-weight:500}
.search-bar{width:100%;padding:8px 14px;font-size:14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);margin-bottom:1rem}
.search-bar:focus{outline:none;border-color:var(--color-border-primary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--color-border-primary)}
.card.expanded{border-color:var(--color-border-secondary)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.badge{font-size:11px;padding:3px 8px;border-radius:12px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.badge-mer{background:#E1F5EE;color:#085041}
.badge-mort{background:#F1EFE8;color:#444441}
.badge-magie{background:#EEEDFE;color:#3C3489}
.badge-royaute{background:#FAEEDA;color:#633806}
.badge-creature{background:#FAECE7;color:#712B13}
.badge-amour{background:#FBEAF0;color:#72243E}
.card-name{font-size:15px;font-weight:500;color:var(--color-text-primary);line-height:1.3}
.card-type{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.card-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:8px}
.card-detail{display:none;margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary)}
.card.expanded .card-detail{display:block}
.card-detail p{font-size:13px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:6px}
.card-detail strong{font-weight:500;color:var(--color-text-primary)}
.local-tag{font-size:11px;color:#185FA5;background:#E6F1FB;padding:2px 7px;border-radius:8px;display:inline-block;margin-top:6px}
.age-tag{font-size:11px;color:var(--color-text-tertiary);float:right;margin-top:6px}
.count{font-size:13px;color:var(--color-text-tertiary);margin-bottom:1rem}
.ask-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer;margin-top:8px}
.ask-btn:hover{background:var(--color-background-secondary)}
</style>

<div class="header">
  <div class="title">Catalogue des contes bretons</div>
  <div class="subtitle">Douarnenez & Cornouaille · Finistère · Bretagne</div>
</div>

<input class="search-bar" type="text" id="search" placeholder="Rechercher un conte, une créature, un personnage..." oninput="render()">

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('tous')">Tous</button>
  <button class="filter-btn" onclick="setFilter('douarnenez')">Ancré à Douarnenez</button>
  <button class="filter-btn" onclick="setFilter('mer')">Mer & marins</button>
  <button class="filter-btn" onclick="setFilter('creature')">Créatures</button>
  <button class="filter-btn" onclick="setFilter('mort')">Mort & au-delà</button>
  <button class="filter-btn" onclick="setFilter('royaute')">Royauté & héros</button>
  <button class="filter-btn" onclick="setFilter('magie')">Magie & sortilèges</button>
  <button class="filter-btn" onclick="setFilter('amour')">Amour & tragédie</button>
</div>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>

let activeFilter = 'tous';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+f+"'"));
  });
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = contes.filter(c => {
    const matchSearch = !q || 
      c.nom.toLowerCase().includes(q) || 
      c.desc.toLowerCase().includes(q) || 
      c.detail.toLowerCase().includes(q) ||
      (c.personnages && c.personnages.toLowerCase().includes(q));
    const matchFilter = activeFilter === 'tous' || 
      (activeFilter === 'douarnenez' && c.localDouarnenez) ||
      c.themes.includes(activeFilter);
    return matchSearch && matchFilter;
  });

  document.getElementById('count').textContent = filtered.length + ' conte' + (filtered.length > 1 ? 's' : '') + ' trouvé' + (filtered.length > 1 ? 's' : '');

  const grid = document.getElementById('grid');
  grid.innerHTML = filtered.map((c, i) => {
    const badgeMap = {mer:'badge-mer',mort:'badge-mort',magie:'badge-magie',royaute:'badge-royaute',creature:'badge-creature',amour:'badge-amour'};
    const themeLabel = {mer:'Mer & marins',mort:'Mort & au-delà',magie:'Magie',royaute:'Royauté',creature:'Créature',amour:'Amour & tragédie'};
    const mainTheme = c.themes[0];
    return `<div class="card" id="card-${i}" onclick="toggle(${i})">
      <div class="card-top">
        <div>
          <div class="card-name">${c.nom}</div>
          <div class="card-type">${c.type}</div>
        </div>
        <span class="badge ${badgeMap[mainTheme]}">${themeLabel[mainTheme]}</span>
      </div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-detail">
        <p>${c.detail}</p>
        ${c.lieux ? `<p><strong>Lieux :</strong> ${c.lieux}</p>` : ''}
        ${c.personnages ? `<p><strong>Personnages :</strong> ${c.personnages}</p>` : ''}
        ${c.localDouarnenez ? '<span class="local-tag">Ancré à Douarnenez</span>' : ''}
        <span class="age-tag">${c.age}</span>
        <br>${c.page
          ? `<a class="ask-btn" href="${c.page}" onclick="event.stopPropagation()" style="text-decoration:none;display:inline-block">Lire le conte complet ↗</a>`
          : `<span style="font-size:11px;color:var(--color-text-tertiary);margin-top:8px;display:inline-block">Version complète bientôt disponible</span>`
        }
      </div>
    </div>`;
  }).join('');
}

function toggle(i) {
  const el = document.getElementById('card-'+i);
  el.classList.toggle('expanded');
}

render();
</script>
