<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contes de Bretagne — Douarnenez</title>
  <link rel="stylesheet" href="css/catalogue.css">
</head>
<body>

<!-- ══════════════════════════════
     LANDING — Grimoire fermé
══════════════════════════════ -->
<section id="landing" onclick="ouvrirGrimoire()">
  <div class="grimoire-wrap">
    <div class="grimoire" id="grimoire">
      <div class="grimoire-dos"></div>
      <div class="grimoire-couverture">
        <p class="cover-title">Contes<br>de Bretagne</p>
        <p class="cover-sub">Douarnenez · Cornouaille</p>
        <div class="cover-anneau">
          <svg class="cover-triskel" viewBox="-45 -45 90 90" xmlns="http://www.w3.org/2000/svg">
            <g fill="#C9A84C">
              <path d="M0,0 C5,-8 12,-18 10,-32 C8,-42 -4,-46 -12,-38 C-20,-30 -16,-18 -6,-10 C-3,-6 0,-3 0,0Z"/>
              <path d="M0,0 C5,-8 12,-18 10,-32 C8,-42 -4,-46 -12,-38 C-20,-30 -16,-18 -6,-10 C-3,-6 0,-3 0,0Z" transform="rotate(120)"/>
              <path d="M0,0 C5,-8 12,-18 10,-32 C8,-42 -4,-46 -12,-38 C-20,-30 -16,-18 -6,-10 C-3,-6 0,-3 0,0Z" transform="rotate(240)"/>
              <circle r="3.5"/>
            </g>
          </svg>
        </div>
        <p class="cover-edition">Grimoire des Légendes</p>
      </div>
    </div>
    <p class="landing-hint">― Ouvrir le grimoire ―</p>
  </div>
</section>

<!-- ══════════════════════════════
     LIVRE — Grimoire ouvert
══════════════════════════════ -->
<section id="livre" class="cache">
  <div class="scene-livre">

    <!-- Navigation mobile -->
    <div class="nav-mobile">
      <button class="nav-mobile-btn actif" id="btn-index" onclick="voirPage('gauche')">Index</button>
      <button class="nav-mobile-btn" id="btn-conte" onclick="voirPage('droite')">Conte</button>
    </div>

    <div class="livre" id="livre-inner">

      <!-- Page gauche : navigation -->
      <div class="page page-gauche">
        <div class="page-entete">
          <span class="page-chapitre">Index des Contes</span>
          <span class="page-numero">I</span>
        </div>
        <div class="page-corps">
          <input class="barre-recherche" id="recherche" type="text"
                 placeholder="Chercher un conte ou un personnage…"
                 oninput="filtrer()">
          <div class="filtres">
            <button class="filtre actif" onclick="setFiltre('tous')">Tous</button>
            <button class="filtre" onclick="setFiltre('douarnenez')">Douarnenez</button>
            <button class="filtre" onclick="setFiltre('mer')">Mer</button>
            <button class="filtre" onclick="setFiltre('creature')">Créatures</button>
            <button class="filtre" onclick="setFiltre('mort')">Mort</button>
            <button class="filtre" onclick="setFiltre('royaute')">Royauté</button>
            <button class="filtre" onclick="setFiltre('magie')">Magie</button>
            <button class="filtre" onclick="setFiltre('amour')">Amour</button>
          </div>
          <ul class="liste-contes" id="liste-contes"></ul>
          <p class="compte" id="compte"></p>
        </div>
        <div class="page-pied"><span class="ornement">✦</span></div>
      </div>

      <!-- Reliure -->
      <div class="reliure">
        <span class="reliure-texte">Contes de Bretagne</span>
      </div>

      <!-- Page droite : détail du conte sélectionné -->
      <div class="page page-droite" id="page-droite">
        <div class="page-entete">
          <span class="page-numero">II</span>
          <span class="page-chapitre" id="titre-droite">—</span>
        </div>
        <div class="page-corps" id="corps-droite"></div>
        <div class="page-pied"><span class="ornement">✦</span></div>
      </div>

    </div>
  </div>
</section>

<script>

    lieux: "Toute la Bretagne, renforcé sur les côtes",

    detail: "Les Marie Morganes sont de belles créatures féminines nées de la mer. Elles habitent un somptueux palais sous-marin. Connues surtout à Ouessant. Elles peuvent aider les hommes ou se venger si on les méprise.",

  {

    detail: "Saint Cornély, poursuivi par une armée romaine, se retourna et pétrifia tous les soldats. C'est ainsi que les alignements furent créés. D'autres versions parlent de korrigans pétrifiés par le soleil.",
    lieux: "Carnac (Morbihan)",
    personnages: "Saint Cornély, armée romaine"
  },
  {
    nom: "Merlin et Brocéliande", type: "Cycle arthurien",

    detail: "Merlin, l'enchanteur du roi Arthur, s'éprend de la fée Viviane. Elle lui extorque ses secrets magiques et l'enferme dans un arbre creux. La fontaine de Barenton, dans la même forêt, est dite magique.",

    detail: "Yan-gant-y-tan est un spectre condamné à errer dans la nuit en tenant cinq bougies allumées. Il les fait tournoyer pour égarer les voyageurs. Le croiser la nuit est un mauvais présage.",

  },
  {
    nom: "Saint Guénolé et Gradlon", type: "Légende hagiographique",

    desc: "Le saint fondateur de l'abbaye de Landévennec, lié à la destruction d'Ys et au salut du roi Gradlon.",
    detail: "Saint Guénolé avertit le roi Gradlon du danger d'Ys. C'est lui qui pousse Dahut dans les flots pour sauver Gradlon. Il fonda l'abbaye de Landévennec, la plus ancienne de Bretagne.",
    lieux: "Baie de Douarnenez, Quimper, Landévennec",

  }
];

const themeLabel = { mer:'Mer', mort:'Mort', magie:'Magie', royaute:'Royauté', creature:'Créature', amour:'Amour' };
const badgeClass  = { mer:'badge-mer', mort:'badge-mort', magie:'badge-magie', royaute:'badge-royaute', creature:'badge-creature', amour:'badge-amour' };

let filtre    = 'tous';
let selection = 0;
let visibles  = contes.map((_,i) => i);

/* ── Ouverture du grimoire ── */
function ouvrirGrimoire() {
  document.getElementById('grimoire').classList.add('ouverture');
  const landing = document.getElementById('landing');
  setTimeout(() => { landing.style.transition = 'opacity 0.45s'; landing.style.opacity = '0'; }, 850);
  setTimeout(() => {
    landing.classList.add('cache');
    const livre = document.getElementById('livre');
    livre.classList.remove('cache');
    livre.style.opacity = '0';
    livre.style.transition = 'opacity 0.5s';
    requestAnimationFrame(() => requestAnimationFrame(() => { livre.style.opacity = '1'; }));
    renderListe();
    afficherConte(0, true);
  }, 1300);
}

/* ── Filtres ── */
function setFiltre(f) {
  filtre = f;
  document.querySelectorAll('.filtre').forEach(b =>
    b.classList.toggle('actif', b.getAttribute('onclick').includes("'"+f+"'"))
  );
  filtrer();
}

function filtrer() {
  const q = document.getElementById('recherche').value.toLowerCase();
  visibles = contes.map((_,i) => i).filter(i => {
    const c = contes[i];
    const matchQ = !q || c.nom.toLowerCase().includes(q)
                       || c.desc.toLowerCase().includes(q)
                       || (c.personnages && c.personnages.toLowerCase().includes(q));
    const matchF = filtre === 'tous'
                || (filtre === 'douarnenez' && c.localDouarnenez)
                || c.themes.includes(filtre);
    return matchQ && matchF;
  });
  renderListe();
  if (visibles.length > 0 && !visibles.includes(selection)) afficherConte(visibles[0], true);
}

/* ── Rendu de la liste ── */
function renderListe() {
  const ul = document.getElementById('liste-contes');
  document.getElementById('compte').textContent = visibles.length + ' conte' + (visibles.length > 1 ? 's' : '');
  if (visibles.length === 0) { ul.innerHTML = '<li class="aucun">Aucun conte trouvé</li>'; return; }
  ul.innerHTML = visibles.map(i => {
    const c = contes[i];
    return `<li class="conte-item${i === selection ? ' selectionne' : ''}" onclick="afficherConte(${i})">
      <span class="item-dot">◆</span>
      <div class="item-texte">
        <span class="item-nom">${c.nom}</span>
        <span class="item-type">${c.type}</span>
      </div>
      ${c.localDouarnenez ? '<span class="item-local" title="Ancré à Douarnenez">★</span>' : ''}
    </li>`;
  }).join('');
}

/* ── Affichage d'un conte (avec animation de page) ── */
function afficherConte(index, sanAnimation) {
  if (index === selection && document.getElementById('corps-droite').innerHTML !== '' && !sanAnimation) return;
  selection = index;

  if (sanAnimation) {
    renderPageDroite();
    renderListe();
    return;
  }

  const pageDroite = document.getElementById('page-droite');
  pageDroite.classList.add('tourne');
  setTimeout(() => { renderPageDroite(); renderListe(); }, 240);
  setTimeout(() => { pageDroite.classList.remove('tourne'); }, 520);
  voirPage('droite');
}

/* ── Rendu de la page droite ── */
function renderPageDroite() {
  const c = contes[selection];
  document.getElementById('titre-droite').textContent = c.nom;
  const badges = c.themes.map(t => `<span class="badge-page ${badgeClass[t]}">${themeLabel[t]}</span>`).join('');
  document.getElementById('corps-droite').innerHTML = `
    <div style="margin-bottom:10px">
      <h2 class="detail-nom">${c.nom}</h2>
      <p class="detail-type">${c.type}</p>
      <div class="detail-badges">${badges}</div>
    </div>
    <p class="detail-desc">${c.desc}</p>
    <div class="separateur">── ✦ ──</div>
    <p class="detail-texte">${c.detail}</p>
    <div class="detail-meta">
      ${c.lieux       ? `<p><strong>Lieux :</strong> ${c.lieux}</p>` : ''}
      ${c.personnages ? `<p><strong>Personnages :</strong> ${c.personnages}</p>` : ''}
    </div>
    <div class="detail-pied">
      ${c.localDouarnenez ? '<span class="etiquette-locale">★ Ancré à Douarnenez</span>' : '<span></span>'}
      <span class="etiquette-age">${c.age}</span>
    </div>
    ${c.page ? `<a href="${c.page}" class="lien-conte">Lire le conte complet ↗</a>` : ''}
  `;
}

/* ── Navigation mobile ── */
function voirPage(cote) {
  const inner  = document.getElementById('livre-inner');
  const btnIdx = document.getElementById('btn-index');
  const btnCte = document.getElementById('btn-conte');
  if (cote === 'droite') {
    inner.classList.add('voir-droite');
    btnIdx.classList.remove('actif');
    btnCte.classList.add('actif');
  } else {
    inner.classList.remove('voir-droite');
    btnIdx.classList.add('actif');
    btnCte.classList.remove('actif');
  }
}
</script>
</body>
</html>
